services:
  - type: web
    name: bexhill-college-workplacement
    runtime: node
    plan: standard
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm install && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy && npm run prisma:ensure-admin
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bexhill-college-workplacement-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://bexhill-college-workplacement.onrender.com
      - key: APP_BASE_URL
        value: https://bexhill-college-workplacement.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: EMAIL_DEV_MODE
        value: "false"

  - type: cron
    name: bexhill-college-nightly
    runtime: node
    schedule: "0 1 * * *"
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run cron:nightly
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bexhill-college-workplacement-db
          property: connectionString

databases:
  - name: bexhill-college-workplacement-db
    plan: basic-1gb
